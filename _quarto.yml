project:
  type: website
  output-dir: docs

website:
  title: "Weekly Deaths Recorded in Northern Ireland"

format:
  html:
    title-block-style: none
    embed-resources: true
    css:
      - nisra-styles.css
    theme: cosmo
    page-layout: full
    include-before-body:
      - _includes/cookies-banner.html
      - _includes/header.html
    include-after-body:
      - _includes/footer.html
    anchor-sections: false
    include-in-header:
      text: |
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

        <link rel="icon" href="images/icon/favicon.ico" type="image/vnd.microsoft.icon" />
        <link rel="icon" type="image/png" href="images/icon/favicon-96x96.png" sizes="96x96" />
        <link rel="icon" type="image/svg+xml" href="images/icon/favicon.svg" />
        <link rel="shortcut icon" href="images/icon/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="images/icon/apple-touch-icon.png" />
        <meta name="apple-mobile-web-app-title" content="Weekly Deaths Recorded in Northern Ireland" />
      
execute:
  echo: false
  message: false
  warning: false