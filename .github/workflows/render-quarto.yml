name: Render and publish Quarto site

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "30 8,9 * * 5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest

    env:
      RENV_CONFIG_REPOS_OVERRIDE: https://cloud.r-project.org

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.3"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libcairo2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libpng-dev \
            libtiff-dev \
            libjpeg-dev \
            libudunits2-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev

      - name: Restore R packages from renv.lock
        uses: r-lib/actions/setup-renv@v2
        
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Render Quarto site
        run: quarto render
      
      - name: Create downloadable PDF
        run: node scripts/create-pdf.js
        
      - name: Commit rendered site
        run: |
          git config --local user.email "explore@nisra.gov.uk"
          git config --local user.name "nisra-explore"
          git add -A docs
          git commit -m "Data updated" || echo "No changes to commit"
          git push origin main || echo "No changes to push"  

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

